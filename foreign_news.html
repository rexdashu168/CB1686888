        full: "歐系券商維持廣達中立評等，指出AI伺服器獲利率確有改善（毛利率預估5.5%），但目前股價本益比達18x，已充分反映2026年成長預期，上行空間有限。目標價285元，維持中立。"
    }
];

// ════════════════════════════════════════════════════
// 狀態
// ════════════════════════════════════════════════════
let activeCat = "all";
let activeStar = 0;
let activeDays = 0;
let searchKeyword = "";
let stockFilter = "";

// ════════════════════════════════════════════════════
// 初始化
// ════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
    updateCounts();
    applyFilters();
    document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') applyFilters(); });
    document.getElementById('stockInput').addEventListener('keydown', e => { if (e.key === 'Enter') filterByStock(); });
});

function updateCounts() {
    const total = reports.length;
    document.getElementById('countAll').textContent = total;
    document.getElementById('countStock').textContent = reports.filter(r => r.cat === 'stock').length;
    document.getElementById('countIndustry').textContent = reports.filter(r => r.cat === 'industry').length;
    document.getElementById('entryCount').textContent = `${total} 則報導`;
}

// ════════════════════════════════════════════════════
// 篩選器
// ════════════════════════════════════════════════════
function setCat(el) {
    document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    activeCat = el.dataset.cat;
    stockFilter = "";
    document.getElementById('stockInput').value = "";
    applyFilters();
}
function setStar(el) {
    document.querySelectorAll('[data-star]').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    activeStar = parseInt(el.dataset.star);
    applyFilters();
}
function setDays(el) {
    document.querySelectorAll('[data-days]').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    activeDays = parseInt(el.dataset.days);
    applyFilters();
}
function filterByStock() {
    stockFilter = document.getElementById('stockInput').value.trim();
    activeCat = "all";
    document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-cat="all"]').classList.add('active');
    applyFilters();
}

function applyFilters() {
    searchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
    const today = new Date();
    const filtered = reports.filter(r => {
        if (activeCat !== "all" && r.cat !== activeCat) return false;
        if (activeStar > 0 && r.stars !== activeStar) return false;
        if (activeDays > 0) {
            const diff = (today - new Date(r.date.replace(/\//g, '-'))) / 86400000;
            if (diff > activeDays) return false;
        }
        if (searchKeyword) {
            const hay = [r.title, r.excerpt, r.full, r.source, r.stockCode, r.stockName].join(' ').toLowerCase();
            if (!hay.includes(searchKeyword)) return false;
        }
        if (stockFilter) {
            const q = stockFilter.toLowerCase();
            if (!r.stockCode.toLowerCase().includes(q) && !r.stockName.toLowerCase().includes(q)
                && !r.title.toLowerCase().includes(q) && !r.excerpt.toLowerCase().includes(q)) return false;
        }
        return true;
    });
    filtered.sort((a, b) => new Date(b.date.replace(/\//g, '-')) - new Date(a.date.replace(/\//g, '-')));
    renderResults(filtered);
}

// ════════════════════════════════════════════════════
// 渲染
// ════════════════════════════════════════════════════
function renderResults(list) {
    const container = document.getElementById('reportList');
    document.getElementById('resultsSummary').textContent = `${list.length} RESULTS`;

    if (list.length === 0) {
        container.innerHTML = '<div class="empty">😔 找不到符合條件的報導</div>';
        return;
    }

    const groups = {};
    list.forEach(r => {
        const ym = r.date.substring(0, 7).replace('/', ' / ');
        if (!groups[ym]) groups[ym] = [];
        groups[ym].push(r);
    });

    let html = '';
    const priceTargets = []; // 待抓價格的報導

    Object.keys(groups).sort((a, b) => b.localeCompare(a)).forEach(ym => {
        html += `<div class="date-group"><div class="date-group-header">${ym}</div>`;
        groups[ym].forEach((r, idx) => {
            const cardId = `card_${ym.replace(/ /g, '')}${idx}`;
            const priceId = `price_${cardId}`;
            const starsStr = '★'.repeat(r.stars) + '☆'.repeat(5 - r.stars);
            const catBadge = r.cat === 'stock'
                ? `<span class="badge badge-stock">個股外電</span>`
                : `<span class="badge badge-industry">產業觀察</span>`;

            // 區間報酬區塊（有股票代號才顯示）
            let priceHtml = '';
            if (r.stockCode) {
                priceHtml = `<div class="price-block" id="${priceId}">
                    <div class="price-row">
                        <span class="price-stock-info">${r.stockName}<span class="price-stock-code">${r.stockCode}</span></span>
                        <span class="price-loading">📡 載入中...</span>
                    </div>
                </div>`;
                priceTargets.push({ code: r.stockCode, date: r.date, market: r.market || 'twse', elId: priceId });
            }

            html += `
            <div class="report-card">
                <div class="report-meta">
                    <span class="report-date">${r.date}</span>
                    <span class="report-source">${r.source}</span>
                    ${catBadge}
                    <span class="stars">${starsStr}</span>
                </div>
                ${priceHtml}
                <div class="report-title" onclick="toggleFull('${cardId}')">${r.title}</div>
                <div class="report-excerpt" id="exc_${cardId}" onclick="toggleFull('${cardId}')">${r.excerpt}</div>
                <div class="report-full" id="${cardId}">${r.full}</div>
            </div>`;
        });
        html += '</div>';
    });

    container.innerHTML = html;

    // 非同步抓股票價格（不阻塞畫面渲染）
    priceTargets.forEach(t => loadPriceBlock(t.code, t.date, t.market, t.elId));
}

function toggleFull(id) {
    const full = document.getElementById(id);
    const exc = document.getElementById('exc_' + id);
    const isOpen = full.classList.contains('open');
    full.classList.toggle('open', !isOpen);
    if (exc) exc.style.display = isOpen ? '' : '';
    if (exc) exc.style['-webkit-line-clamp'] = isOpen ? '3' : 'unset';
    exc.style.display = isOpen ? '' : 'block';
    exc.style.webkitLineClamp = isOpen ? '3' : 'unset';
    exc.style.overflow = isOpen ? 'hidden' : 'visible';
}

// ════════════════════════════════════════════════════
// 股票價格 (TWSE Open API + TPEX fallback)
// 資料來源：台灣證券交易所 openapi.twse.com.tw
// ════════════════════════════════════════════════════
const priceCache = {};

async function fetchTWSEMonth(code, year, month) {
    const key = `twse_${code}_${year}_${month}`;
    if (priceCache[key] !== undefined) return priceCache[key];
    const yyyymm01 = `${year}${String(month).padStart(2, '0')}01`;
    try {
        const res = await fetch(`https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY?stockNo=${code}&date=${yyyymm01}`);
        if (!res.ok) { priceCache[key] = null; return null; }
        const data = await res.json();
        const result = Array.isArray(data) && data.length > 0 ? data : null;
        priceCache[key] = result;
        return result;
    } catch(e) { priceCache[key] = null; return null; }
}

async function fetchTPEXMonth(code, year, month) {
    const key = `tpex_${code}_${year}_${month}`;
    if (priceCache[key] !== undefined) return priceCache[key];
    // 櫃買中心：民國年月格式
    const rocYear = year - 1911;
    const mm = String(month).padStart(2, '0');
    try {
        const res = await fetch(`https://www.tpex.org.tw/openapi/v1/tpex_esb_sec_neweqty_ipoinfo`);
        // TPEX 日K endpoint: 用 tpex_esb_daily_close_quotes by stock
        const res2 = await fetch(`https://www.tpex.org.tw/web/stock/aftertrading/daily_trading_info/st43_result.php?l=zh-tw&d=${rocYear}/${mm}/01&stkno=${code}&o=json`);
        if (!res2.ok) { priceCache[key] = null; return null; }
        const data = await res2.json();
        // TPEX returns { aaData: [[date, vol, val, open, high, low, close, ...], ...] }
        if (!data.aaData || data.aaData.length === 0) { priceCache[key] = null; return null; }
        // Convert to TWSE-like format for unified processing
        const rows = data.aaData.map(row => ({
            Date: row[0],         // "115/06/01" (ROC)
            ClosingPrice: row[6], // close price
            _isTpex: true
        }));
        priceCache[key] = rows;
        return rows;
    } catch(e) { priceCache[key] = null; return null; }
}

function rocToDate(rocStr) {
    // "115/06/11" or "115/6/11" -> Date
    const p = rocStr.replace(/\s/g, '').split('/');
    return new Date(parseInt(p[0]) + 1911, parseInt(p[1]) - 1, parseInt(p[2]));
}

function parseClose(val) {
    if (val == null) return NaN;
    const n = parseFloat(String(val).replace(/,/g, ''));
    return isNaN(n) ? NaN : n;
}

async function loadPriceBlock(code, reportDateStr, market, elId) {
    const el = document.getElementById(elId);
    if (!el) return;

    const [yr, mo, dy] = reportDateStr.split('/').map(Number);
    const reportDate = new Date(yr, mo - 1, dy);
    const today = new Date();
    const curYear = today.getFullYear();
    const curMonth = today.getMonth() + 1;

    const fetchFn = market === 'tpex' ? fetchTPEXMonth : fetchTWSEMonth;

    // 抓報導當月資料
    let rows = await fetchFn(code, yr, mo) || [];

    // 如果報導不在本月，再抓本月資料取得最新收盤
    if (yr !== curYear || mo !== curMonth) {
        const curRows = await fetchFn(code, curYear, curMonth) || [];
        rows = [...rows, ...curRows];
    }

    // 解析並排序
    const parsed = rows
        .map(r => ({ date: rocToDate(r.Date), close: parseClose(r.ClosingPrice) }))
        .filter(r => !isNaN(r.close) && r.date instanceof Date && !isNaN(r.date))
        .sort((a, b) => a.date - b.date);

    if (parsed.length === 0) {
        el.innerHTML = `<div class="price-row">
            <span class="price-stock-info">${el.querySelector('.price-stock-info')?.textContent || code}</span>
            <span class="price-na">暫無報價</span>
        </div>`;
        return;
    }

    // 起始價：報導日當天或之後第一個交易日
    const startRow = parsed.find(r => r.date >= reportDate);
    if (!startRow) {
        el.innerHTML = el.innerHTML.replace('<span class="price-loading">📡 載入中...</span>', '<span class="price-na">-</span>');
        return;
    }

    // 結束價：最後一個有資料的交易日
    const endRow = parsed[parsed.length - 1];
    const pct = (endRow.close - startRow.close) / startRow.close * 100;
    const isUp = pct >= 0;
    const daysDiff = Math.max(0, Math.round((endRow.date - startRow.date) / 86400000));

    const fmt = d => `${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;

    // 取出股票資訊文字（保留原先的名稱+代號）
    const stockInfoEl = el.querySelector('.price-stock-info');
    const stockInfoHtml = stockInfoEl ? stockInfoEl.outerHTML : `<span class="price-stock-info">${code}</span>`;

    el.innerHTML = `
        <div class="price-row">
            ${stockInfoHtml}
            <span class="price-pct ${isUp ? 'up' : 'down'}">${isUp ? '▲' : '▼'} ${Math.abs(pct).toFixed(2)}%</span>
        </div>
        <div class="price-detail">
            <span class="price-values">${startRow.close.toFixed(2)} — ${endRow.close.toFixed(2)}</span>
            <span class="price-period">${fmt(startRow.date)} - ${fmt(endRow.date)} · ${daysDiff}日</span>
        </div>`;
}
</script>

</html>

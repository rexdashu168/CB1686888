let searchKeyword = "";
let stockFilter = "";

// ── 初始化 ─────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
    updateCounts();
    applyFilters();

    document.getElementById('searchInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') applyFilters();
    });
    document.getElementById('stockInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') filterByStock();
    });
});

// ── 更新 tab 數量 ──────────────────────────────────────────────────────────
function updateCounts() {
    const total = reports.length;
    const stockCount = reports.filter(r => r.cat === 'stock').length;
    const indCount = reports.filter(r => r.cat === 'industry').length;
    document.getElementById('countAll').textContent = total;
    document.getElementById('countStock').textContent = stockCount;
    document.getElementById('countIndustry').textContent = indCount;
    document.getElementById('entryCount').textContent = `${total} 則報導`;
}

// ── 篩選器設定 ────────────────────────────────────────────────────────────
function setCat(el) {
    document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    activeCat = el.dataset.cat;
    stockFilter = "";
    document.getElementById('stockInput').value = "";
    applyFilters();
}

    document.querySelectorAll('[data-star]').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    activeStar = parseInt(el.dataset.star);
    applyFilters();
}

function setDays(el) {
    document.querySelectorAll('[data-days]').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    activeDays = parseInt(el.dataset.days);
    applyFilters();
}

function filterByStock() {
    stockFilter = document.getElementById('stockInput').value.trim();
    activeCat = "all";
    document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-cat="all"]').classList.add('active');
    applyFilters();
}

// ── 主篩選邏輯 ────────────────────────────────────────────────────────────
function applyFilters() {
    searchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
    const today = new Date();

    const filtered = reports.filter(r => {
        // 分類
        if (activeCat !== "all" && r.cat !== activeCat) return false;

        // 星等
        if (activeStar > 0 && r.stars !== activeStar) return false;

        // 時間
        if (activeDays > 0) {
            const rDate = new Date(r.date.replace(/\//g, '-'));
            const diff = (today - rDate) / (1000 * 60 * 60 * 24);
            if (diff > activeDays) return false;
        }

        // 關鍵字搜尋
        if (searchKeyword) {
            const haystack = [r.title, r.excerpt, r.source, r.stockCode, r.full].join(' ').toLowerCase();
            if (!haystack.includes(searchKeyword)) return false;
        }

        // 個股代號篩選
        if (stockFilter) {
            const q = stockFilter.toLowerCase();
            if (!r.stockCode.toLowerCase().includes(q) && !r.title.toLowerCase().includes(q) && !r.excerpt.toLowerCase().includes(q)) return false;
        }

        return true;
    });

    // 排序：最新優先
    filtered.sort((a, b) => new Date(b.date.replace(/\//g, '-')) - new Date(a.date.replace(/\//g, '-')));

    renderResults(filtered);
}

// ── 渲染結果 ──────────────────────────────────────────────────────────────
function renderResults(list) {
    const container = document.getElementById('reportList');
    const summary = document.getElementById('resultsSummary');

    summary.textContent = `${list.length} RESULTS`;

    if (list.length === 0) {
        container.innerHTML = '<div class="empty">😔 找不到符合條件的報導</div>';
        return;
    }

    // 按年月分組
    const groups = {};
    list.forEach(r => {
        const ym = r.date.substring(0, 7).replace('/', ' / ');
        if (!groups[ym]) groups[ym] = [];
        groups[ym].push(r);
    });

    let html = '';
    Object.keys(groups).sort((a, b) => b.localeCompare(a)).forEach(ym => {
        html += `<div class="date-group">
            <div class="date-group-header">${ym}</div>`;
        groups[ym].forEach((r, idx) => {
            const id = `card_${ym.replace(/ /g,'')}${idx}`;
            const starsStr = '★'.repeat(r.stars) + '☆'.repeat(5 - r.stars);
            const catBadge = r.cat === 'stock'
                ? `<span class="badge badge-stock">個股外電</span>`
                : `<span class="badge badge-industry">產業觀察</span>`;
            const stockTag = r.stockCode ? `<span class="stock-tag">${r.stockCode}</span>` : '';
            html += `
            <div class="report-card" onclick="toggleFull('${id}')">
                <div class="report-meta">
                    <span class="report-date">${r.date}</span>
                    <span class="report-source">${r.source}</span>
                    ${catBadge}
                    <span class="stars">${starsStr}</span>
                    ${stockTag}
                </div>
                <div class="report-title">${r.title}</div>
                <div class="report-excerpt" id="exc_${id}">${r.excerpt}</div>
                <div class="report-full" id="${id}">${r.full}</div>
            </div>`;
        });
        html += '</div>';
    });

    container.innerHTML = html;
}

// ── 展開/收合全文 ─────────────────────────────────────────────────────────
function toggleFull(id) {
    const full = document.getElementById(id);
    const exc = document.getElementById('exc_' + id);
    const isOpen = full.classList.contains('open');
    full.classList.toggle('open', !isOpen);
    if (exc) exc.style.display = isOpen ? '' : 'none';
}
</script>
